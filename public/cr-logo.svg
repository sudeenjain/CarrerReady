<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#4f46e5" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Subtle inner border for glass effect -->
  <rect x="8" y="8" width="496" height="496" rx="120" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4" />

  <!-- Typography CR with shadow and glow -->
  <text 
    x="50%" 
    y="56%" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="280" 
    font-weight="900" 
    letter-spacing="-12"
    text-anchor="middle" 
    dominant-baseline="middle" 
    fill="url(#textGrad)"
    filter="url(#shadow)"
  >
    CR
  </text>
  
  <!-- Little Sparkle/Dot -->
  <circle cx="400" cy="140" r="16" fill="#38bdf8" filter="url(#glow)"/>
</svg>
