<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerReadyAI | Engineering Prestige</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234f46e5%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22900%22 font-size=%2260%22>CR</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,400;1,700;1,800&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            cyber: {
              black: '#000000',
              dark: '#020617',
              blue: '#3b82f6',
              glow: 'rgba(59, 130, 246, 0.5)',
              border: 'rgba(255, 255, 255, 0.05)'
            }
          },
          animation: {
            'shimmer': 'shimmer 2s infinite linear',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'glow': 'glow 3s ease-in-out infinite alternate',
          },
          keyframes: {
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' }
            },
            glow: {
              '0%': { boxShadow: '0 0 5px rgba(79, 70, 229, 0.2)' },
              '100%': { boxShadow: '0 0 20px rgba(79, 70, 229, 0.4)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --primary: #4f46e5;
      --secondary: #4338ca;
      --bg-dark: #020617;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: #f1f5f9;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    .gradient-bg {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    }

    .gradient-text {
      background: linear-gradient(135deg, #fff 0%, #4f46e5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .glass-prestige {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-blur {
      background: rgba(2, 6, 23, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(79, 70, 229, 0.2);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    input, textarea, select {
      background-color: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      color: #ffffff !important;
      outline: none !important;
      transition: all 0.3s ease !important;
    }

    input:focus, textarea:focus {
      border-color: var(--primary) !important;
      background-color: rgba(255, 255, 255, 0.05) !important;
      box-shadow: 0 0 15px rgba(79, 70, 229, 0.1) !important;
    }

    .interactive-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .interactive-card:hover {
      transform: translateY(-4px) scale(1.01);
      border-color: rgba(79, 70, 229, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(79, 70, 229, 0.1);
    }

    ::selection {
      background: rgba(79, 70, 229, 0.3);
      color: white;
    }
  </style>
</head>
<body class="selection:bg-indigo-500/30">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
