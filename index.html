<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerReadyAI | Engineering Prestige</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,400;1,700;1,800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            prestige: {
              bg: '#020617',
              card: '#0f172a',
              border: 'rgba(255, 255, 255, 0.08)',
              accent: '#4f46e5'
            }
          },
          animation: {
            'shimmer': 'shimmer 2s infinite linear',
            'float': 'float 6s ease-in-out infinite',
            'glow': 'glow 4s ease-in-out infinite',
          },
          keyframes: {
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' }
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' }
            },
            glow: {
              '0%, 100%': { opacity: 0.8, filter: 'brightness(1)' },
              '50%': { opacity: 1, filter: 'brightness(1.5)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --primary: #4f46e5;
      --secondary: #7c3aed;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
      color: #f1f5f9;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .font-display { font-family: 'Plus Jakarta Sans', sans-serif; }

    .gradient-bg {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    }

    .gradient-text {
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .glass-prestige {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-blur {
      background: rgba(2, 6, 23, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(79, 70, 229, 0.2);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    /* Fix for visible text in inputs */
    input, textarea, select {
      background-color: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: #ffffff !important;
      outline: none !important;
    }

    input:focus, textarea:focus {
      border-color: var(--primary) !important;
      background-color: rgba(255, 255, 255, 0.05) !important;
    }

    input::placeholder, textarea::placeholder {
      color: #64748b !important;
    }
  </style>
</head>
<body class="selection:bg-indigo-500/30">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
