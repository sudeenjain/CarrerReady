<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerReadyAI | Understand the Universe of Careers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            x: {
              black: '#000000',
              gray: '#161616',
              blue: '#2f80ed',
              border: 'rgba(255, 255, 255, 0.1)'
            }
          },
          animation: {
            'shimmer': 'shimmer 2s infinite linear',
            'fade-in': 'fadeIn 0.8s ease-out forwards',
          },
          keyframes: {
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' }
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }

    .x-gradient-text {
      background: linear-gradient(to bottom, #ffffff 0%, #a1a1a1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .x-border {
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .x-glow {
      box-shadow: 0 0 40px rgba(47, 128, 237, 0.1);
    }

    .custom-scrollbar::-webkit-scrollbar { width: 2px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }

    ::selection {
      background: rgba(255, 255, 255, 0.99);
      color: #000000;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
